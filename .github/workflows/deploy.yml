name: Deploy to S3

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        env:
          BUCKET: danilocloud.me
        run: |
          # Assets estáticos: cache largo (app.jsx?v=8 / styles.css?v=8 hacen cache busting)
          aws s3 sync frontend/ s3://$BUCKET/ \
            --delete \
            --cache-control "public, max-age=604800, immutable"

          # index.html y data.json: siempre frescos (sobrescribe los headers del paso anterior)
          aws s3 cp s3://$BUCKET/index.html s3://$BUCKET/index.html \
            --metadata-directive REPLACE \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate"

          aws s3 cp s3://$BUCKET/data.json s3://$BUCKET/data.json \
            --metadata-directive REPLACE \
            --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate"

