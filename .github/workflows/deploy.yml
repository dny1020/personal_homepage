name: CI/CD Deploy Only

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Cloudflare DNS
        env:
          CF_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          EC2_IP: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN}" ]; then
            echo "CF_DNS_API_TOKEN is missing" >&2
            exit 1
          fi
          if [ -z "${EC2_IP}" ]; then
            echo "EC2_HOST is missing" >&2
            exit 1
          fi
          if [ -z "${CF_ZONE_ID:-}" ]; then
            CF_ZONE_ID=$(curl -fsSL "https://api.cloudflare.com/client/v4/zones?name=danilocloud.me" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              | jq -r '.result[0].id')
          fi
          if [ -z "${CF_ZONE_ID}" ] || [ "${CF_ZONE_ID}" = "null" ]; then
            echo "Could not resolve Cloudflare zone id for danilocloud.me; set CF_ZONE_ID secret." >&2
            exit 1
          fi

          update_record() {
            record_name="$1"
            record_id=$(curl -fsSL "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=A&name=${record_name}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              | jq -r '.result[0].id')
            if [ -z "${record_id}" ] || [ "${record_id}" = "null" ]; then
              curl -fsSL -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"A\",\"name\":\"${record_name}\",\"content\":\"${EC2_IP}\",\"ttl\":120,\"proxied\":false}" \
                | jq -e '.success' >/dev/null
            else
              curl -fsSL -X PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${record_id}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"A\",\"name\":\"${record_name}\",\"content\":\"${EC2_IP}\",\"ttl\":120,\"proxied\":false}" \
                | jq -e '.success' >/dev/null
            fi
          }

          update_record "danilocloud.me"
          update_record "www.danilocloud.me"

      - name: Sync files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend,backend,docker-compose.yml,homepage.conf"
          target: "~/app"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install Docker if not present
            if ! [ -x "$(command -v docker)" ]; then
              sudo dnf update -y
              sudo dnf install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi
            
            # Install Docker Compose if not present
            if ! [ -x "$(command -v docker-compose)" ]; then
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              sudo ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose
            fi

            # Install Docker Buildx plugin from GitHub if missing or older than 0.17.0
            BUILDX_MIN="0.17.0"
            BUILDX_VERSION=$(docker buildx version 2>/dev/null | grep -oP '\d+\.\d+\.\d+' | head -1)
            NEEDS_BUILDX=false
            if [ -z "$BUILDX_VERSION" ]; then
              NEEDS_BUILDX=true
            elif [ "$(printf '%s\n' "$BUILDX_MIN" "$BUILDX_VERSION" | sort -V | head -1)" != "$BUILDX_MIN" ]; then
              NEEDS_BUILDX=true
            fi
            if [ "$NEEDS_BUILDX" = true ]; then
              BUILDX_TAG=$(curl -fsSL https://api.github.com/repos/docker/buildx/releases/latest | grep '"tag_name"' | sed -E 's/.*"(v[^"]+)".*/\1/')
              sudo mkdir -p /usr/lib/docker/cli-plugins
              sudo curl -fsSL "https://github.com/docker/buildx/releases/download/${BUILDX_TAG}/buildx-${BUILDX_TAG}.linux-amd64" \
                -o /usr/lib/docker/cli-plugins/docker-buildx
              sudo chmod +x /usr/lib/docker/cli-plugins/docker-buildx
            fi

            # Use docker compose (new) instead of docker-compose (old) if possible
            DOCKER_COMPOSE="sudo /usr/local/bin/docker-compose"
            if docker compose version >/dev/null 2>&1; then
              DOCKER_COMPOSE="sudo docker compose"
            fi

            cd ~/app
            # Install certbot and cloudflare plugin if missing
            if ! [ -x "$(command -v certbot)" ]; then
              sudo dnf install -y certbot python3-certbot-dns-cloudflare
            fi

            # Configure cloudflare credentials for certbot
            mkdir -p ~/.secrets/certbot
            echo "dns_cloudflare_api_token = ${{ secrets.CF_DNS_API_TOKEN }}" > ~/.secrets/certbot/cloudflare.ini
            chmod 600 ~/.secrets/certbot/cloudflare.ini

            # Obtain/Renew certificate
            sudo certbot certonly \
              --dns-cloudflare \
              --dns-cloudflare-credentials ~/.secrets/certbot/cloudflare.ini \
              --email 08porous-mucks@icloud.com \
              --agree-tos \
              --no-eff-email \
              -d danilocloud.me \
              -d www.danilocloud.me \
              --non-interactive

            # Create directory for certificates if it doesn't exist
            mkdir -p etc/letsencrypt
            sudo cp -L -r /etc/letsencrypt/live etc/
            sudo cp -L -r /etc/letsencrypt/archive etc/
            sudo chown -R ec2-user:ec2-user etc/letsencrypt

            $DOCKER_COMPOSE up -d --build
