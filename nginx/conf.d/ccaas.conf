server {
  listen 80;
  server_name bot.danilocloud.me;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name bot.danilocloud.me;

  ssl_certificate /etc/letsencrypt/live/bot.danilocloud.me/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/bot.danilocloud.me/privkey.pem;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Static SPA assets (hashed filenames — long cache)
  location /app/assets/ {
    proxy_pass http://host.docker.internal:8000;
    proxy_set_header Host $host;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # WebSocket (agent inbox + webchat)
  location /ws/ {
    proxy_pass http://host.docker.internal:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
  }

  # Everything else → FastAPI app
  location / {
    proxy_pass http://host.docker.internal:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 60s;
  }
}
