##
# Nginx site for danilocloud.me
# - Serves static frontend from /opt/homepage/frontend
# - Proxies API requests to the FastAPI service on 127.0.0.1:5000
##

server {
  listen 80;
  listen [::]:80;
  server_name danilocloud.me www.danilocloud.me;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name danilocloud.me www.danilocloud.me;

  # TLS certs on the VPS (matches other danilocloud.me vhosts)
  ssl_certificate /etc/ssl/danilocloud.me/fullchain.pem;
  ssl_certificate_key /etc/ssl/danilocloud.me/privkey.pem;

  root /opt/homepage/frontend;
  index index.html;

  # Basic hardening
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Frontend SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static caching
  location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # API proxy (frontend calls /api/info)
  location /api/ {
    proxy_pass http://127.0.0.1:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Health endpoint passthrough
  location = /health {
    proxy_pass http://127.0.0.1:5000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
